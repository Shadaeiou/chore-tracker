name: Test Android

on:
  push:
    branches: [main]
    paths: ["android/**", ".github/workflows/test-android.yml"]
  pull_request:
    paths: ["android/**", ".github/workflows/test-android.yml"]
  workflow_dispatch:

jobs:
  unit:
    name: JVM unit + Robolectric Compose tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Run unit + Robolectric tests
        working-directory: android
        run: gradle :app:testDebugUnitTest --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-unit-test-reports
          path: android/app/build/reports/tests/testDebugUnitTest/

  emulator-e2e:
    name: Maestro E2E on emulator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build debug APK
        working-directory: android
        run: gradle :app:assembleDebug -PapiBaseUrl=${{ vars.API_BASE_URL || 'https://chore-tracker-api.example.workers.dev/' }}

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro flows on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_5
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            maestro test .maestro/

      - name: Upload Maestro screenshots and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-artifacts
          path: |
            ~/.maestro/tests/**
            ~/.maestro/logs/**

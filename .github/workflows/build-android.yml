name: Build Android APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      apiBaseUrl:
        description: "Override API base URL (optional)"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Determine API base URL
        id: api
        run: |
          URL="${{ github.event.inputs.apiBaseUrl }}"
          if [ -z "$URL" ]; then URL="${{ vars.API_BASE_URL }}"; fi
          if [ -z "$URL" ]; then URL="https://chore-tracker-api.example.workers.dev/"; fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        working-directory: android
        run: gradle :app:assembleDebug -PapiBaseUrl=${{ steps.api.outputs.url }}

      - uses: actions/upload-artifact@v4
        with:
          name: chore-tracker-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk

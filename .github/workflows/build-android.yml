name: Build Android APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      apiBaseUrl:
        description: "Override API base URL (optional)"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so git rev-list --count HEAD gives real commit count

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Determine API base URL
        id: api
        run: |
          URL="${{ github.event.inputs.apiBaseUrl }}"
          if [ -z "$URL" ]; then URL="${{ vars.API_BASE_URL }}"; fi
          if [ -z "$URL" ]; then URL="https://chore-tracker-api.example.workers.dev/"; fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Decode signing keystore
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set — cannot produce a signed release APK."
            exit 1
          fi
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"
          echo "RELEASE_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          echo "RELEASE_KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Build release APK
        working-directory: android
        run: gradle :app:assembleRelease -PapiBaseUrl=${{ steps.api.outputs.url }}

      - uses: actions/upload-artifact@v4
        with:
          name: chore-tracker-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      # Compute the same versionCode the Gradle build derives so the in-app
      # updater can compare against the release tag.
      - name: Compute version
        id: ver
        run: |
          CODE=$(git rev-list --count HEAD)
          NAME="0.1.$CODE"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "tag=v${NAME}+${CODE}" >> "$GITHUB_OUTPUT"

      # On push-to-main: auto-publish a Release tagged v<name>+<code>. The
      # in-app updater hits /releases/latest, parses the tag, and installs.
      # APKs are signed with the keystore decoded above so installs from this
      # stream chain correctly.
      - name: Publish auto-release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.name }} (build ${{ steps.ver.outputs.code }})
          files: android/app/build/outputs/apk/release/app-release.apk
          prerelease: true
          body: |
            Automated build from commit ${{ github.sha }}.

            See the commit log for what changed.

      - name: Attach APK to manual tag release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk

name: Build Android APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      apiBaseUrl:
        description: "Override API base URL (optional)"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so git rev-list --count HEAD gives real commit count

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Determine API base URL
        id: api
        run: |
          URL="${{ github.event.inputs.apiBaseUrl }}"
          if [ -z "$URL" ]; then URL="${{ vars.API_BASE_URL }}"; fi
          if [ -z "$URL" ]; then URL="https://chore-tracker-api.example.workers.dev/"; fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        working-directory: android
        run: gradle :app:assembleDebug -PapiBaseUrl=${{ steps.api.outputs.url }}

      - uses: actions/upload-artifact@v4
        with:
          name: chore-tracker-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # Compute the same versionCode the Gradle build derives so the in-app
      # updater can compare against the release tag.
      - name: Compute version
        id: ver
        run: |
          CODE=$(git rev-list --count HEAD)
          NAME="0.1.$CODE"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "tag=v${NAME}+${CODE}" >> "$GITHUB_OUTPUT"

      # On push-to-main: auto-publish a Release tagged v<name>+<code>. The
      # in-app updater hits /releases/latest, parses the tag, and installs.
      # NOTE: signing is currently the random debug keystore that GitHub
      # Actions generates per-runner, which means installs from this stream
      # will fail with "signature mismatch" until we plumb a stable keystore
      # through GH secrets. The bootstrap is in place; signing is the next
      # piece.
      - name: Publish auto-release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.name }} (build ${{ steps.ver.outputs.code }})
          files: android/app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
          body: |
            Automated build from commit ${{ github.sha }}.

            See the commit log for what changed.

      - name: Attach APK to manual tag release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
